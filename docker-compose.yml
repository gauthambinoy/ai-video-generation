version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - db
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: video_gen
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
